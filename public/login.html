<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BreachGuard — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --red:#ff2d55; --cyan:#00e5ff; --dark:#080c14; --card:#0d1520; --border:rgba(0,229,255,0.15); }
    body { font-family:'Syne',sans-serif; background:var(--dark); color:white; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }

    /* grid bg */
    body::after {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .container { position:relative; z-index:1; width:100%; max-width:420px; }

    .logo { text-align:center; margin-bottom:36px; }
    .logo-icon { font-size:48px; margin-bottom:8px; }
    .logo h1 { font-size:28px; font-weight:800; }
    .logo h1 span { color:var(--red); }
    .logo p { font-family:'Space Mono',monospace; font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:2px; margin-top:6px; }

    .card {
      background:var(--card); border:1px solid var(--border); border-radius:20px;
      padding:36px; transition:box-shadow 0.3s;
    }
    .card:focus-within { box-shadow:0 0 40px rgba(0,229,255,0.1); }

    .field { margin-bottom:20px; }
    .field-label { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; color:rgba(255,255,255,0.35); margin-bottom:8px; display:block; }
    .field-input {
      width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
      border-radius:10px; padding:14px 16px; color:white;
      font-family:'Space Mono',monospace; font-size:14px; outline:none;
      transition:border-color 0.3s, box-shadow 0.3s;
    }
    .field-input::placeholder { color:rgba(255,255,255,0.2); }
    .field-input:focus { border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,229,255,0.08); }

    .login-btn {
      width:100%; padding:16px; background:var(--red); color:white; border:none;
      border-radius:10px; font-family:'Syne',sans-serif; font-size:16px; font-weight:700;
      cursor:pointer; margin-top:8px; letter-spacing:1px;
      transition:background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .login-btn:hover { background:#ff4466; transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,45,85,0.3); }
    .login-btn:active { transform:scale(0.98); }
    .login-btn:disabled { opacity:0.5; pointer-events:none; }

    .msg {
      margin-top:16px; text-align:center;
      font-family:'Space Mono',monospace; font-size:12px;
      min-height:20px; letter-spacing:1px;
    }
    .msg.success { color:#00ff88; }
    .msg.error { color:var(--red); }

    .back-link {
      display:block; text-align:center; margin-top:24px;
      font-family:'Space Mono',monospace; font-size:11px;
      color:rgba(255,255,255,0.3); text-decoration:none; letter-spacing:1px;
      transition:color 0.2s;
    }
    .back-link:hover { color:var(--cyan); }

    .divider { height:1px; background:var(--border); margin:24px 0; }

    .security-note {
      display:flex; align-items:center; gap:8px;
      font-family:'Space Mono',monospace; font-size:10px;
      color:rgba(255,255,255,0.2); letter-spacing:1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <h1>BREACH<span>GUARD</span></h1>
      <p>// ADMIN ACCESS PORTAL</p>
    </div>

    <div class="card">
      <div class="field">
        <label class="field-label">EMAIL ADDRESS</label>
        <input class="field-input" id="email" type="email" placeholder="admin@company.com" onkeydown="if(event.key==='Enter') login()"/>
      </div>
      <div class="field">
        <label class="field-label">PASSWORD</label>
        <input class="field-input" id="password" type="password" placeholder="••••••••••" onkeydown="if(event.key==='Enter') login()"/>
      </div>

      <button class="login-btn" id="loginBtn" onclick="login()">ACCESS DASHBOARD</button>
      <div class="msg" id="msg"></div>

      <div class="divider"></div>
      <div class="security-note">🔒 Encrypted connection · Admin only</div>
    </div>

    <a href="/index.html" class="back-link">← Return to home</a>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('loginBtn');

      if (!email || !password) { msg.textContent = 'Fill in all fields.'; msg.className='msg error'; return; }

      btn.textContent = 'VERIFYING...'; btn.disabled = true;
      msg.textContent = ''; msg.className = 'msg';

      try {
        const res = await fetch('/api/auth/login', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({email, password})
        });
        const data = await res.json();

        if (data.token) {
          localStorage.setItem('token', data.token);
          msg.textContent = '✓ Authenticated. Redirecting...';
          msg.className = 'msg success';
          setTimeout(() => window.location.href = '/admin.html', 800);
        } else {
          msg.textContent = '✕ ' + (data.message || 'Invalid credentials');
          msg.className = 'msg error';
          btn.textContent = 'ACCESS DASHBOARD'; btn.disabled = false;
        }
      } catch(e) {
        msg.textContent = '✕ Server error. Try again.';
        msg.className = 'msg error';
        btn.textContent = 'ACCESS DASHBOARD'; btn.disabled = false;
      }
    }
  </script>
</body>
</html>
