<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BreachGuard — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --red:#ff2d55; --cyan:#00e5ff; --dark:#080c14; --card:#0d1520; --border:rgba(0,229,255,0.15); --green:#00ff88; }
    body { font-family:'Syne',sans-serif; background:var(--dark); color:white; min-height:100vh; }

    /* SIDEBAR */
    .layout { display:flex; min-height:100vh; }
    .sidebar {
      width:220px; background:#08111e; border-right:1px solid var(--border);
      padding:32px 20px; display:flex; flex-direction:column; gap:8px;
      position:sticky; top:0; height:100vh;
    }
    .sidebar-logo { font-size:20px; font-weight:800; margin-bottom:28px; }
    .sidebar-logo span { color:var(--red); }
    .nav-item {
      display:flex; align-items:center; gap:10px;
      padding:10px 14px; border-radius:10px; cursor:pointer;
      font-family:'Space Mono',monospace; font-size:12px; letter-spacing:1px;
      color:rgba(255,255,255,0.35); transition:all 0.2s; text-decoration:none;
    }
    .nav-item:hover { background:rgba(0,229,255,0.07); color:var(--cyan); }
    .nav-item.active { background:rgba(0,229,255,0.1); color:var(--cyan); border:1px solid rgba(0,229,255,0.15); }
    .sidebar-footer { margin-top:auto; font-family:'Space Mono',monospace; font-size:10px; color:rgba(255,255,255,0.2); letter-spacing:1px; }

    /* MAIN */
    .main { flex:1; padding:40px; overflow-x:auto; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:36px; }
    .top-bar h1 { font-size:28px; font-weight:800; }
    .top-bar h1 span { color:var(--cyan); }
    .status-pill { display:flex; align-items:center; gap:8px; background:rgba(0,255,136,0.1); border:1px solid rgba(0,255,136,0.2); padding:8px 16px; border-radius:100px; font-family:'Space Mono',monospace; font-size:11px; color:var(--green); }
    .status-dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 1.5s infinite; }

    /* STATS */
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:28px; }
    .stat-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:22px; transition:border-color 0.3s, transform 0.2s; }
    .stat-card:hover { border-color:var(--cyan); transform:translateY(-2px); }
    .stat-num { font-family:'Space Mono',monospace; font-size:28px; color:var(--cyan); }
    .stat-label { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:1.5px; color:rgba(255,255,255,0.3); margin-top:6px; }

    /* LOAD BTN */
    .load-btn {
      display:inline-flex; align-items:center; gap:8px;
      background:var(--red); color:white; border:none; border-radius:10px;
      padding:12px 24px; font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
      cursor:pointer; margin-bottom:24px; transition:background 0.2s, transform 0.15s, box-shadow 0.2s;
      letter-spacing:0.5px;
    }
    .load-btn:hover { background:#ff4466; transform:translateY(-2px); box-shadow:0 8px 20px rgba(255,45,85,0.3); }
    .load-btn:active { transform:scale(0.97); }

    /* TABLE */
    .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
    .table-head-row { padding:18px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .table-title { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:2px; color:rgba(255,255,255,0.35); }
    table { width:100%; border-collapse:collapse; }
    thead th { padding:13px 20px; text-align:left; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; color:rgba(255,255,255,0.3); border-bottom:1px solid rgba(255,255,255,0.06); }
    tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); transition:background 0.2s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:rgba(0,229,255,0.04); }
    td { padding:14px 20px; font-size:14px; }
    .name-cell { font-weight:700; }
    .email-cell { font-family:'Space Mono',monospace; font-size:12px; color:rgba(255,255,255,0.6); }
    .role-pill { display:inline-block; padding:3px 12px; border-radius:100px; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:1px; }
    .role-pill.admin { background:rgba(255,183,0,0.1); color:#ffb700; border:1px solid rgba(255,183,0,0.2); }
    .role-pill.user { background:rgba(0,229,255,0.08); color:var(--cyan); border:1px solid rgba(0,229,255,0.15); }
    .date-cell { font-family:'Space Mono',monospace; font-size:11px; color:rgba(255,255,255,0.3); }

    .empty-row { padding:40px; text-align:center; font-family:'Space Mono',monospace; font-size:12px; color:rgba(255,255,255,0.25); letter-spacing:2px; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @media(max-width:768px) { .layout{flex-direction:column} .sidebar{width:100%;height:auto;flex-direction:row;flex-wrap:wrap;gap:4px;padding:16px} .sidebar-logo{width:100%} .sidebar-footer{display:none} .stats{grid-template-columns:1fr 1fr} }
  </style>
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-logo">BREACH<span>GUARD</span></div>
      <a href="/index.html" class="nav-item">🏠 HOME</a>
      <a href="/checker.html" class="nav-item">🔍 CHECKER</a>
      <a href="/breaches.html" class="nav-item">📡 BREACHES</a>
      <a href="/admin.html" class="nav-item active">👑 ADMIN</a>
      <div class="sidebar-footer">v1.0.0 · SECURE</div>
    </div>

    <div class="main">
      <div class="top-bar">
        <h1>ADMIN <span>DASHBOARD</span></h1>
        <div class="status-pill"><div class="status-dot"></div>SYSTEM ONLINE</div>
      </div>

      <div class="stats">
        <div class="stat-card"><div class="stat-num" id="statUsers">—</div><div class="stat-label">REGISTERED USERS</div></div>
        <div class="stat-card"><div class="stat-num" id="statAdmins">—</div><div class="stat-label">ADMIN ACCOUNTS</div></div>
        <div class="stat-card"><div class="stat-num" id="statLatest">—</div><div class="stat-label">LATEST JOIN</div></div>
      </div>

      <button class="load-btn" id="loadBtn" onclick="loadUsers()">👁 LOAD USER RECORDS</button>

      <div class="table-wrap" id="tableWrap" style="display:none;">
        <div class="table-head-row">
          <span class="table-title">// USER REGISTRY</span>
          <span id="userCount" style="font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1px;"></span>
        </div>
        <table>
          <thead><tr><th>NAME</th><th>EMAIL</th><th>ROLE</th><th>JOINED</th></tr></thead>
          <tbody id="usersBody"><tr><td colspan="4" class="empty-row">LOADING...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    async function loadUsers() {
      const token = localStorage.getItem('token');
      const btn = document.getElementById('loadBtn');
      btn.textContent = '⏳ FETCHING...'; btn.disabled = true;

      try {
        const res = await fetch('/api/admin/users', { headers:{ Authorization:'Bearer '+token } });
        const data = await res.json();

        if (!data.users) {
          alert('Access denied. Please log in as admin.');
          window.location.href = '/login.html';
          return;
        }

        const users = data.users;
        document.getElementById('statUsers').textContent = users.length;
        document.getElementById('statAdmins').textContent = users.filter(u=>u.role==='admin').length;
        const latest = users.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))[0];
        document.getElementById('statLatest').textContent = latest ? new Date(latest.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—';
        document.getElementById('userCount').textContent = users.length + ' RECORDS';

        const tbody = document.getElementById('usersBody');
        tbody.innerHTML = '';
        users.forEach((u, i) => {
          const tr = document.createElement('tr');
          tr.style.animationDelay = (i*0.05)+'s';
          tr.innerHTML = `
            <td class="name-cell">${u.name}</td>
            <td class="email-cell">${u.email}</td>
            <td><span class="role-pill ${u.role}">${u.role.toUpperCase()}</span></td>
            <td class="date-cell">${new Date(u.createdAt).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})}</td>
          `;
          tbody.appendChild(tr);
        });

        document.getElementById('tableWrap').style.display = 'block';
        btn.textContent = '↻ RELOAD RECORDS'; btn.disabled = false;
      } catch(e) {
        btn.textContent = '👁 LOAD USER RECORDS'; btn.disabled = false;
        alert('Failed to load users. Make sure you are logged in.');
      }
    }
  </script>
</body>
</html>
